# Port on which the Spring Boot server will run
server.port=8080

# -----------------
# DATABASE SETTINGS
# -----------------
# JDBC connection string for MySQL.
# "createDatabaseIfNotExist=true" ensures that if the database 'janvoice_ai' does not exist yet, MySQL will create it automatically on startup.
# "allowPublicKeyRetrieval=true" and "useSSL=false" are standard parameters for local testing.
spring.datasource.url=jdbc:mysql://localhost:3306/janvoice_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=atharv
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------
# JPA / HIBERNATE SETTINGS
# -----------------
# "update" tells Hibernate to automatically examine our @Entity annotations on startup,
# compare them to the current database state, and auto-generate or alter tables to match.
spring.jpa.hibernate.ddl-auto=update
# Prints the SQL queries being executed to the terminal console (great for debugging queries).
spring.jpa.show-sql=true
spring.jpa.properties.spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -----------------
# AI ENGINE SETTINGS (Google Gemini API)
# -----------------
# Google Gemini API key. It uses the environment variable GEMINI_API_KEY if present, otherwise defaults to empty string.
gemini.api.key=${GEMINI_API_KEY:}
# The REST API endpoint for the Gemini 1.5 Flash model (good for speed, cost, and high context/multimodal tasks).
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
